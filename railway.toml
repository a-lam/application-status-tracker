[build]
builder = "nixpacks"
buildCommand = "npm install --prefix server && npm run build --prefix client && npm run db:generate --prefix server && npm run db:migrate --prefix server"

[deploy]
startCommand = "npm start --prefix server"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
